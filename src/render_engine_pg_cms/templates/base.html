<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RenderPG{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Figtree:ital,wght@0,300..700;1,300..700&family=JetBrains+Mono:wght@400;500&family=Allura&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="themeSwitcher" :data-theme="theme">
  <header class="masthead">
    <div class="masthead-inner">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-word">RenderPG</span>
      </a>
      <nav class="sections">
        {% for name, ct in (content_types or {}).items() %}
          <a href="/c/{{ name }}" class="section-link">
            <span class="section-dot">—</span>{{ name }}
          </a>
        {% endfor %}
      </nav>
      <div class="theme-switch" role="group" aria-label="Uniform">
        <template x-for="t in themes" :key="t.id">
          <button type="button" class="theme-chip"
                  :class="theme === t.id ? 'is-active' : ''"
                  :title="t.label"
                  @click="set(t.id)">
            <span class="theme-swatch" :style="`background:${t.swatch}`"></span>
            <span class="theme-label" x-text="t.short"></span>
          </button>
        </template>
      </div>
      <a href="/webmentions" class="wm-indicator" x-data="wmIndicator" x-init="start()"
         :class="running ? 'is-running' : ''"
         :title="running ? 'Webmention sync in progress…' : (finished_at ? ('Last sync: ' + finished_at) : 'Webmentions')">
        <svg class="wm-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/>
        </svg>
        <span x-show="!running" x-text="changed > 0 ? ('wm · +' + changed) : 'wm'"></span>
        <span x-show="running" x-text="total_expected ? ('syncing ' + processed + '/' + total_expected) : 'syncing…'"></span>
      </a>
      <form method="post" action="/publish" class="publish"
            x-data="publishBtn" x-init="start()" @submit.prevent="dispatch()">
        <button type="submit" class="btn btn-ghost"
                :class="running ? 'is-publishing' : ''"
                :disabled="running || !configured"
                :title="titleText">
          <span x-text="running ? 'Publishing…' : (lastLabel || 'Publish')"></span>
          <svg class="publish-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"
               x-show="!running">
            <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
          <svg class="publish-icon publish-spin" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"
               x-show="running">
            <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                  d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/>
          </svg>
        </button>
      </form>
    </div>
    <div class="masthead-rule"></div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.addEventListener("alpine:init", () => {
      Alpine.data("themeSwitcher", () => ({
        theme: localStorage.getItem("renderpg-theme") || "home",
        themes: [
          { id: "home", label: "Home whites", short: "Home", swatch: "#f6efe0" },
          { id: "road", label: "Road · night", short: "Road", swatch: "#13274f" },
          { id: "city", label: "City Connect", short: "ATL", swatch: "#a8c9dc" },
        ],
        set(id) {
          this.theme = id;
          localStorage.setItem("renderpg-theme", id);
        },
      }));
    });
    // Set theme ASAP to avoid flash of wrong theme.
    (function () {
      const t = localStorage.getItem("renderpg-theme") || "home";
      document.body && document.body.setAttribute("data-theme", t);
    })();
    document.addEventListener("alpine:init", () => {
      Alpine.data("wmIndicator", () => ({
        running: false,
        finished_at: null,
        changed: 0,
        processed: 0,
        total_expected: 0,
        _timer: null,
        async poll() {
          try {
            const r = await fetch("/webmentions/status", { headers: { "accept": "application/json" } });
            if (!r.ok) return;
            const s = await r.json();
            this.running = s.running;
            this.finished_at = s.finished_at;
            this.changed = s.changed || 0;
            this.processed = s.processed || 0;
            this.total_expected = s.total_expected || 0;
            // Faster cadence while a sync is live.
            const next = s.running ? 1500 : 5000;
            clearInterval(this._timer);
            this._timer = setInterval(() => this.poll(), next);
          } catch (_) {}
        },
        start() { this.poll(); },
      }));
    });
    document.addEventListener("alpine:init", () => {
      Alpine.data("publishBtn", () => ({
        configured: true,
        running: false,
        lastLabel: "",
        titleText: "Publish site",
        _timer: null,
        async dispatch() {
          if (this.running) return;
          this.running = true;
          this.lastLabel = "";
          this.titleText = "Dispatching publish…";
          try {
            const r = await fetch("/publish", { method: "POST", headers: { "accept": "text/html" } });
            if (!r.ok) {
              this.running = false;
              this.titleText = "Publish dispatch failed (" + r.status + ")";
              return;
            }
          } catch (_) {
            this.running = false;
            this.titleText = "Publish dispatch failed";
            return;
          }
          this._schedule(15000);
        },
        async poll() {
          try {
            const r = await fetch("/publish/status", { headers: { "accept": "application/json" } });
            if (!r.ok) return this._schedule(15000);
            const s = await r.json();
            this.configured = s.configured !== false;
            const wasRunning = this.running;
            this.running = !!s.running;
            if (s.run) {
              const when = s.run.updated_at || s.run.created_at || "";
              const conc = s.run.conclusion ? (" · " + s.run.conclusion) : "";
              this.titleText = "Last run: " + (s.run.display_title || "publish") + conc + (when ? (" (" + when + ")") : "");
              if (!this.running) {
                this.lastLabel = s.run.conclusion === "success"
                  ? "Published"
                  : (s.run.conclusion ? ("Publish: " + s.run.conclusion) : "Publish");
                if (wasRunning) {
                  // Clear the "Published" pill after a moment so the button returns to rest.
                  setTimeout(() => { this.lastLabel = ""; }, 6000);
                }
              }
            } else if (!this.configured) {
              this.titleText = "Set GITHUB_TOKEN and GITHUB_REPO to enable publishing";
            }
            this._schedule(15000);
          } catch (_) {
            this._schedule(15000);
          }
        },
        _schedule(ms) {
          clearTimeout(this._timer);
          this._timer = setTimeout(() => this.poll(), ms);
        },
        start() { this.poll(); },
      }));
    });
  </script>
  <footer class="colophon">
    <span>set in Fraunces &amp; Source Serif</span>
    <span>·</span>
    <span>tended by hand</span>
    <span>·</span>
    <span>go braves ⚾</span>
  </footer>
</body>
</html>
