<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title | default(SITE_TITLE) }}{% endblock %} · {{ SITE_TITLE }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Figtree:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-word">{{ SITE_TITLE }}</span>
      </a>
      <nav class="sections">
        <a class="section-link" href="/">Home</a>
        <a class="section-link" href="/docs/">Docs</a>
        <a class="section-link" href="https://github.com/kjaymiller/render-engine-pg-cms" rel="noopener" target="_blank">GitHub ↗</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="colophon">
    <p>{{ SITE_TAGLINE }}</p>
    <p class="muted">Built with <a href="https://github.com/render-engine/render-engine">render-engine</a>.</p>
  </footer>
</body>
</html>
