# fnox secret store — age-encrypted, safe to commit.
# Decryption needs the age identity at key_file (kept outside the repo).
# Populate/rotate with:  printf '%s' "<value>" | fnox set <KEY> -p age
# Consume in tasks with:  fnox exec -- <command>

[providers.age]
type = "age"
recipients = ["age17aezy08ad25pdkkexa9kzxatrvq76jmh37z9ew9r30hw47epldsqsu6vjf"]
key_file = "~/.config/fnox/age-identity.txt"

[secrets]
CONNECTION_STRING= { provider = "age", value = "" }
MASTODON_ACCESS_TOKEN= { provider = "age", value = "" }
WEBMENTION_IO_TOKEN= { provider = "age", value = "" }
BLUESKY_APP_PASSWORD= { provider = "age", value = "" }
GITHUB_TOKEN= { provider = "age", value = "" }
AZURE_STORAGE_CONNECTION_STRING= { provider = "age", value = "" }
CMS_API_TOKEN= { provider = "age", value = "" }
